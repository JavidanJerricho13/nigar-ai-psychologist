name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

concurrency:
  group: deploy-main
  cancel-in-progress: false # never cancel an in-flight deploy

jobs:
  verify:
    name: Verify before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build shared packages
        run: |
          pnpm --filter @nigar/shared-types build
          pnpm --filter @nigar/prisma-client build

      - name: Typecheck (per-package, bypass turbo)
        run: |
          pnpm --filter @nigar/shared-types typecheck
          pnpm --filter @nigar/prisma-client typecheck
          pnpm --filter @nigar/api typecheck
          pnpm --filter @nigar/tg-bot typecheck

  deploy:
    name: Deploy to VPS
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Execute deploy.sh on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 20m
          script: |
            cd ~/aipsychologist
            bash infra/deploy.sh

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed — check SSH action logs above"
