version: '3.9'

# Production stack for Nigar AI Psychologist
# Services: Caddy (HTTPS proxy) → API (NestJS) + Bot (grammY polling) + Redis
# PostgreSQL is external (Supabase free tier).

services:
  caddy:
    image: caddy:2-alpine
    container_name: nigar-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - nigar-net
    depends_on:
      - api
      - admin
    environment:
      - DOMAIN=${DOMAIN}
      - ADMIN_DOMAIN=${ADMIN_DOMAIN}
      - ADMIN_BASIC_AUTH_HASH=${ADMIN_BASIC_AUTH_HASH}

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: nigar-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - API_PORT=3000
      - REDIS_URL=redis://redis:6379
    networks:
      - nigar-net
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  bot:
    build:
      context: .
      dockerfile: infra/Dockerfile.tg-bot
    container_name: nigar-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - BOT_MODE=polling
      - REDIS_URL=redis://redis:6379
    networks:
      - nigar-net
    depends_on:
      - redis
      - api

  admin:
    build:
      context: .
      dockerfile: infra/Dockerfile.admin
    container_name: nigar-admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ADMIN_PORT=3001
    networks:
      - nigar-net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: nigar-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - nigar-net

networks:
  nigar-net:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  redis-data:
